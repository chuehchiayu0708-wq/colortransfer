<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIS 慣用色轉換器 (含搜尋與複製)</title>
    <style>
        :root {
            --primary-bg: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
        }

        /* 搜尋框設計 */
        .search-box {
            grid-column: 1 / -1;
            margin-bottom: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: #5654A2; /* 桔梗色 */
        }

        /* 左側：色彩網格 */
        .color-list-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-height: 600px;
            overflow-y: auto;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .color-item {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eaeaea;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .color-item:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .color-swatch { height: 65px; width: 100%; }
        .color-name { font-size: 13px; padding: 6px 4px; background: #fff; }

        /* 右側：顯示結果與複製 */
        .display-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .preview-box {
            width: 100%;
            height: 160px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-content {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 4px;
        }

        .info-value {
            font-family: "Courier New", Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #222;
        }

        /* 複製按鈕 */
        .copy-btn {
            background-color: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #e0e0e0;
            color: #000;
        }

        .copy-btn.copied {
            background-color: #4CAF50;
            color: white;
        }

        /* 隱藏無結果提示 */
        #noResults {
            display: none;
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin: 0; color: #2c3e50;">JIS 慣用色轉換器</h1>
        <p style="color: #7f8c8d; margin-top: 5px;">點擊色塊即可自動轉換 RGB / CMYK，並支援快速複製</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋 JIS 顏色名稱 (例如：櫻色、瑠璃色)...">
    </div>

    <div class="color-list-container">
        <div class="color-grid" id="colorGrid"></div>
        <div id="noResults">找不到相符的顏色</div>
    </div>

    <div class="display-panel">
        <div class="preview-box" id="previewBox">預覽</div>
        
        <div class="info-row">
            <div class="info-content">
                <span class="info-label">JIS 名稱</span>
                <span class="info-value" id="valName">---</span>
            </div>
            </div>

        <div class="info-row">
            <div class="info-content">
                <span class="info-label">HEX 色碼</span>
                <span class="info-value" id="valHex">#000000</span>
            </div>
            <button class="copy-btn" onclick="copyText('valHex', this)">複製</button>
        </div>

        <div class="info-row">
            <div class="info-content">
                <span class="info-label">RGB (網頁設計)</span>
                <span class="info-value" id="valRgb">rgb(0, 0, 0)</span>
            </div>
            <button class="copy-btn" onclick="copyText('valRgb', this)">複製</button>
        </div>

        <div class="info-row">
            <div class="info-content">
                <span class="info-label">CMYK (印刷設定)</span>
                <span class="info-value" id="valCmyk">C:0% M:0% Y:0% K:100%</span>
            </div>
            <button class="copy-btn" onclick="copyText('valCmyk', this)">複製</button>
        </div>
    </div>
</div>

<script>
    // 1. JIS 標準色彩資料庫 (擴充版)
    const jisColors = [
        { name: "櫻色", hex: "#FEF4F4" },
        { name: "鴇色", hex: "#F4B3C2" },
        { name: "珊瑚色", hex: "#F596AA" },
        { name: "桃色", hex: "#F58F98" },
        { name: "牡丹色", hex: "#EA66A6" },
        { name: "紅赤", hex: "#D9333F" },
        { name: "臙脂", hex: "#B94047" },
        { name: "朱色", hex: "#EB6101" },
        { name: "山吹色", hex: "#F8B500" },
        { name: "黃金", hex: "#E6B422" },
        { name: "刈安色", hex: "#F5E56B" },
        { name: "萌黃", hex: "#AACF53" },
        { name: "若草色", hex: "#C3D825" },
        { name: "綠", hex: "#3EB370" },
        { name: "常磐色", hex: "#007B43" },
        { name: "水色", hex: "#BCE2E8" },
        { name: "露草色", hex: "#38A1DB" },
        { name: "瑠璃色", hex: "#1E50A2" },
        { name: "紺青", hex: "#192F60" },
        { name: "藤色", hex: "#BBBCDE" },
        { name: "桔梗色", hex: "#5654A2" },
        { name: "紫", hex: "#884898" },
        { name: "亞麻色", hex: "#D6C6AF" },
        { name: "鳶色", hex: "#95483F" },
        { name: "銀鼠", hex: "#AFAFB0" },
        { name: "墨色", hex: "#313131" },
        { name: "漆黑", hex: "#0D0015" }
    ];

    // 2. 轉換數學邏輯
    function hexToRgb(hex) {
        let r = parseInt(hex.substring(1, 3), 16);
        let g = parseInt(hex.substring(3, 5), 16);
        let b = parseInt(hex.substring(5, 7), 16);
        return { r, g, b };
    }

    function rgbToCmyk(r, g, b) {
        let r_prime = r / 255;
        let g_prime = g / 255;
        let b_prime = b / 255;
        
        let k = 1 - Math.max(r_prime, g_prime, b_prime);
        let c = (k === 1) ? 0 : (1 - r_prime - k) / (1 - k);
        let m = (k === 1) ? 0 : (1 - g_prime - k) / (1 - k);
        let y = (k === 1) ? 0 : (1 - b_prime - k) / (1 - k);

        return {
            c: Math.round(c * 100) || 0,
            m: Math.round(m * 100) || 0,
            y: Math.round(y * 100) || 0,
            k: Math.round(k * 100) || 0
        };
    }

    // 3. UI 更新邏輯
    function updateDisplay(colorObj) {
        const rgb = hexToRgb(colorObj.hex);
        const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);

        // 判斷背景深淺來決定預覽文字的顏色
        const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
        const textColor = brightness > 125 ? '#333' : '#fff';

        const previewBox = document.getElementById('previewBox');
        previewBox.style.backgroundColor = colorObj.hex;
        previewBox.style.color = textColor;
        previewBox.innerText = colorObj.name;

        document.getElementById('valName').innerText = colorObj.name;
        document.getElementById('valHex').innerText = colorObj.hex.toUpperCase();
        document.getElementById('valRgb').innerText = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        document.getElementById('valCmyk').innerText = `C:${cmyk.c}% M:${cmyk.m}% Y:${cmyk.y}% K:${cmyk.k}%`;
    }

    // 4. 渲染網格與搜尋過濾功能
    const grid = document.getElementById('colorGrid');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');

    function renderGrid(filterText = "") {
        grid.innerHTML = ""; // 清空現有網格
        
        const filteredColors = jisColors.filter(color => 
            color.name.includes(filterText)
        );

        if (filteredColors.length === 0) {
            noResults.style.display = "block";
        } else {
            noResults.style.display = "none";
            filteredColors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'color-item';
                div.innerHTML = `
                    <div class="color-swatch" style="background-color: ${color.hex}"></div>
                    <div class="color-name">${color.name}</div>
                `;
                div.onclick = () => updateDisplay(color);
                grid.appendChild(div);
            });
        }
    }

    // 監聽搜尋框輸入事件
    searchInput.addEventListener('input', (e) => {
        renderGrid(e.target.value.trim());
    });

    // 5. 複製到剪貼簿功能
    function copyText(elementId, btnElement) {
        const textToCopy = document.getElementById(elementId).innerText;
        
        // 使用 Clipboard API
        navigator.clipboard.writeText(textToCopy).then(() => {
            // 視覺回饋：更改按鈕文字與樣式
            const originalText = btnElement.innerText;
            btnElement.innerText = "已複製！";
            btnElement.classList.add("copied");

            // 1.5秒後恢復原狀
            setTimeout(() => {
                btnElement.innerText = "複製";
                btnElement.classList.remove("copied");
            }, 1500);
        }).catch(err => {
            console.error('複製失敗:', err);
            alert("複製失敗，請手動複製");
        });
    }

    // 初始化：渲染所有顏色，並預設顯示第一種顏色
    renderGrid();
    updateDisplay(jisColors[0]);

</script>

</body>
</html>
